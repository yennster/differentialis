name: Release DMG

# When a GitHub Release is published, build Differentialis and attach a
# drag-to-Applications .dmg so users can download and install it directly.
# Can also be run manually against an existing tag via "Run workflow".

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build and attach the DMG to (e.g. v0.1.0)"
        required: true

permissions:
  contents: write

jobs:
  build-dmg:
    runs-on: macos-26   # GA Apple-silicon image with Xcode 26 preinstalled
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Build the tagged commit, not the default branch. Without this a manual
          # (workflow_dispatch) run checks out main and would ship whatever is on main under the
          # requested tag's name.
          ref: ${{ github.event.release.tag_name || github.event.inputs.tag }}
          fetch-depth: 0   # full history so the Sparkle build number (commit count) is monotonic

      - name: Select Xcode 26
        run: |
          if [ -d "/Applications/Xcode_26.5.app" ]; then
            sudo xcode-select -s /Applications/Xcode_26.5.app
          fi
          xcodebuild -version
          swift --version

      - name: Install build tools
        run: brew install xcodegen create-dmg

      - name: Resolve version
        id: ver
        run: |
          TAG="${{ github.event.release.tag_name || github.event.inputs.tag }}"
          VERSION="${TAG#v}"
          # Monotonic CFBundleVersion for Sparkle's version comparison (marketing version
          # alone isn't what Sparkle compares). Commit count is strictly increasing.
          BUILD_NUMBER="$(git rev-list --count HEAD)"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION:-0.0.0}" >> "$GITHUB_OUTPUT"
          echo "build=$BUILD_NUMBER" >> "$GITHUB_OUTPUT"
          echo "Building $TAG (marketing ${VERSION:-0.0.0}, build $BUILD_NUMBER)"

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build (Release)
        run: |
          xcodebuild \
            -project Differentialis.xcodeproj \
            -scheme Differentialis \
            -configuration Release \
            -destination 'generic/platform=macOS' \
            -derivedDataPath build \
            MARKETING_VERSION="${{ steps.ver.outputs.version }}" \
            CURRENT_PROJECT_VERSION="${{ steps.ver.outputs.build }}" \
            CODE_SIGNING_ALLOWED=NO \
            clean build

      # ---- Optional Developer ID signing + notarization -------------------
      # Enabled automatically when the signing secrets are present; otherwise
      # the build is ad-hoc signed (see scripts/make-dmg.sh) and still works,
      # but users get a Gatekeeper prompt on first launch.
      #
      # Required repo secrets to enable:
      #   MACOS_DEVID_P12_BASE64    base64 of a "Developer ID Application" .p12
      #   MACOS_DEVID_P12_PASSWORD  the .p12 export password
      #   MACOS_NOTARY_KEY_BASE64   base64 of the App Store Connect API key .p8
      #   MACOS_NOTARY_KEY_ID       the key id (e.g. ABCDE12345)
      #   MACOS_NOTARY_ISSUER_ID    the issuer id (a UUID)
      - name: Detect signing config
        id: signing
        env:
          P12: ${{ secrets.MACOS_DEVID_P12_BASE64 }}
        run: |
          if [ -n "$P12" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "Developer ID signing + notarization: ENABLED"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Developer ID signing not configured — using ad-hoc fallback."
          fi

      - name: Detect Sparkle appcast key
        id: sparkle
        env:
          KEY: ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}
        run: |
          if [ -n "$KEY" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "Sparkle appcast signing: ENABLED"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "SPARKLE_ED_PRIVATE_KEY not set — appcast will not be generated."
          fi

      - name: Import Developer ID certificate
        if: steps.signing.outputs.enabled == 'true'
        env:
          P12_BASE64: ${{ secrets.MACOS_DEVID_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.MACOS_DEVID_P12_PASSWORD }}
        run: |
          KEYCHAIN="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PASS="$(openssl rand -base64 24)"
          echo "$P12_BASE64" | base64 --decode > "$RUNNER_TEMP/devid.p12"
          security create-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN"
          security import "$RUNNER_TEMP/devid.p12" -k "$KEYCHAIN" -P "$P12_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASS" "$KEYCHAIN" >/dev/null
          # Keep the existing keychains in the search list and add ours.
          # shellcheck disable=SC2046
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | sed 's/[" ]//g')
          IDENTITY="$(security find-identity -v -p codesigning "$KEYCHAIN" | awk '/Developer ID Application/ {print $2; exit}')"
          echo "IDENTITY=$IDENTITY" >> "$GITHUB_ENV"
          rm -f "$RUNNER_TEMP/devid.p12"

      - name: Sign app (Developer ID, hardened runtime)
        if: steps.signing.outputs.enabled == 'true'
        run: |
          APP="build/Build/Products/Release/Differentialis.app"
          FRAMEWORKS="$APP/Contents/Frameworks"
          sign() { codesign --force --options runtime --timestamp --sign "$IDENTITY" "$@"; }

          # Sparkle bundles helper tools — XPC services, the Updater UI app, and the
          # Autoupdate binary — that each need Developer ID + hardened-runtime signatures,
          # signed deepest-first before the framework and the app, or notarization rejects them.
          SPARKLE="$FRAMEWORKS/Sparkle.framework"
          if [ -d "$SPARKLE" ]; then
            while IFS= read -r -d '' x; do sign "$x"; done < <(find "$SPARKLE" -name "*.xpc" -print0)
            while IFS= read -r -d '' x; do sign "$x"; done < <(find "$SPARKLE" -name "Updater.app" -print0)
            while IFS= read -r -d '' x; do sign "$x"; done < <(find "$SPARKLE" -name "Autoupdate" -type f -print0)
            sign "$SPARKLE"
          fi

          # Any other bundled dylibs.
          find "$FRAMEWORKS" -type f -name "*.dylib" -print0 2>/dev/null \
            | xargs -0 -I{} codesign --force --options runtime --timestamp --sign "$IDENTITY" {} || true

          # Finally the app bundle itself.
          sign "$APP"
          codesign --verify --strict --verbose=2 "$APP"

      - name: Create DMG
        run: |
          chmod +x scripts/make-dmg.sh
          scripts/make-dmg.sh \
            "build/Build/Products/Release/Differentialis.app" \
            "dist/Differentialis-${{ steps.ver.outputs.version }}.dmg"

      - name: Notarize and staple
        if: steps.signing.outputs.enabled == 'true'
        env:
          NOTARY_KEY_BASE64: ${{ secrets.MACOS_NOTARY_KEY_BASE64 }}
          NOTARY_KEY_ID: ${{ secrets.MACOS_NOTARY_KEY_ID }}
          NOTARY_ISSUER_ID: ${{ secrets.MACOS_NOTARY_ISSUER_ID }}
        run: |
          DMG="dist/Differentialis-${{ steps.ver.outputs.version }}.dmg"
          echo "$NOTARY_KEY_BASE64" | base64 --decode > "$RUNNER_TEMP/notary.p8"
          codesign --force --timestamp --sign "$IDENTITY" "$DMG" || true
          xcrun notarytool submit "$DMG" \
            --key "$RUNNER_TEMP/notary.p8" \
            --key-id "$NOTARY_KEY_ID" \
            --issuer "$NOTARY_ISSUER_ID" \
            --wait
          xcrun stapler staple "$DMG"
          xcrun stapler validate "$DMG"
          rm -f "$RUNNER_TEMP/notary.p8"

      - name: Attach DMG to the release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          files: dist/Differentialis-*.dmg
          fail_on_unmatched_files: true
          append_body: true
          body: |

            ---
            ### Install
            1. Download `Differentialis-${{ steps.ver.outputs.version }}.dmg` below and open it.
            2. Drag **Differentialis** onto the **Applications** folder.
            3. ${{ steps.signing.outputs.enabled == 'true' && 'Signed with Developer ID and notarized by Apple — just open it.' || 'This build is not notarized, so on first launch right-click the app → **Open** (or run `xattr -dr com.apple.quarantine /Applications/Differentialis.app`).' }}

            After this version is installed, future updates install in-app from **Differentialis → Check for Updates…** — no more manual DMG downloads.

      # Sparkle in-app updates: generate an EdDSA-signed appcast over the final (notarized,
      # stapled) DMG and attach it as `appcast.xml`. Installed apps read it from the repo's
      # "latest" release (SUFeedURL in Info.plist) to self-update.
      - name: Generate, sign, and publish the Sparkle appcast
        if: steps.sparkle.outputs.enabled == 'true'
        env:
          SPARKLE_ED_PRIVATE_KEY: ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.ver.outputs.tag }}"
          # Sparkle's CLI tools, pinned to the framework version the app links against.
          curl -fsSL -o "$RUNNER_TEMP/sparkle.tar.xz" \
            "https://github.com/sparkle-project/Sparkle/releases/download/2.9.3/Sparkle-2.9.3.tar.xz"
          mkdir -p "$RUNNER_TEMP/sparkle"
          tar -xf "$RUNNER_TEMP/sparkle.tar.xz" -C "$RUNNER_TEMP/sparkle"
          printf '%s' "$SPARKLE_ED_PRIVATE_KEY" > "$RUNNER_TEMP/sparkle_ed_private"

          # generate_appcast reads the DMG in dist/, pulls CFBundleVersion/ShortVersionString
          # from the app inside, EdDSA-signs the DMG, and writes dist/appcast.xml with the
          # enclosure pointing at this release's asset.
          "$RUNNER_TEMP/sparkle/bin/generate_appcast" \
            --ed-key-file "$RUNNER_TEMP/sparkle_ed_private" \
            --download-url-prefix "https://github.com/yennster/differentialis/releases/download/${TAG}/" \
            --link "https://github.com/yennster/differentialis/releases/tag/${TAG}" \
            dist/
          rm -f "$RUNNER_TEMP/sparkle_ed_private"

          echo "---- generated appcast.xml ----"
          cat dist/appcast.xml
          gh release upload "$TAG" dist/appcast.xml --clobber
