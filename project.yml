name: Differentialis
options:
  bundleIdPrefix: app.differentialis
  deploymentTarget:
    macOS: "26.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "0.1.5"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_STRICT_CONCURRENCY: minimal
packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.9.3"
targets:
  Differentialis:
    type: application
    platform: macOS
    sources:
      - path: Differentialis
    dependencies:
      - package: Sparkle
    info:
      path: Differentialis/Info.plist
      properties:
        CFBundleDisplayName: Differentialis
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        LSApplicationCategoryType: public.app-category.developer-tools
        LSMinimumSystemVersion: "$(MACOSX_DEPLOYMENT_TARGET)"
        NSHumanReadableCopyright: ""
        # Sparkle self-update: feed lives on the GitHub "latest" release as an
        # attached asset; the EdDSA public key verifies every downloaded update.
        SUFeedURL: https://github.com/yennster/differentialis/releases/latest/download/appcast.xml
        SUPublicEDKey: 4CPTyeclcSK+OP2J09skgo/PVIjFc5S/beHTnphcjL8=
        SUEnableAutomaticChecks: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.differentialis.Differentialis
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_HARDENED_RUNTIME: "NO"
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Manual
        CODE_SIGNING_REQUIRED: "NO"
        CODE_SIGNING_ALLOWED: "YES"
        COMBINE_HIDPI_IMAGES: "YES"
        ENABLE_PREVIEWS: "YES"
        DEAD_CODE_STRIPPING: "YES"
  DifferentialisTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests
    dependencies:
      - target: Differentialis
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.differentialis.DifferentialisTests
        GENERATE_INFOPLIST_FILE: "YES"
        CODE_SIGNING_ALLOWED: "NO"
schemes:
  Differentialis:
    build:
      targets:
        Differentialis: all
        DifferentialisTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - DifferentialisTests
