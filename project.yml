name: Differentialis
options:
  bundleIdPrefix: app.differentialis
  deploymentTarget:
    macOS: "26.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "0.1.9"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_STRICT_CONCURRENCY: minimal
packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.9.3"
targets:
  Differentialis:
    type: application
    platform: macOS
    sources:
      - path: Differentialis
        excludes:
          - Resources/Info.plist
          - Resources/differentialis
      - path: Differentialis/Resources/differentialis
        buildPhase: resources
    dependencies:
      - package: Sparkle
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.differentialis.Differentialis
        GENERATE_INFOPLIST_FILE: "YES"
        INFOPLIST_FILE: Differentialis/Resources/Info.plist
        INFOPLIST_KEY_CFBundleDisplayName: Differentialis
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.developer-tools
        INFOPLIST_KEY_NSHumanReadableCopyright: ""
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_HARDENED_RUNTIME: "NO"
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Manual
        CODE_SIGNING_REQUIRED: "NO"
        CODE_SIGNING_ALLOWED: "YES"
        COMBINE_HIDPI_IMAGES: "YES"
        ENABLE_PREVIEWS: "YES"
        DEAD_CODE_STRIPPING: "YES"
  DifferentialisTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests
    dependencies:
      - target: Differentialis
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.differentialis.DifferentialisTests
        GENERATE_INFOPLIST_FILE: "YES"
        CODE_SIGNING_ALLOWED: "NO"
schemes:
  Differentialis:
    build:
      targets:
        Differentialis: all
        DifferentialisTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - DifferentialisTests
